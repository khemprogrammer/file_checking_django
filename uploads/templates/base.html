{% load static %}
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Secure File Upload</title>
<link rel="stylesheet" href="{% static 'uploads/style.css' %}">
</head>
<body>
<header class="site-header">
  <div class="container header-inner">
    <div class="brand">Secure File Upload</div>
    <nav class="nav">
      <a class="nav-link" href="/">Upload</a>
      <a class="nav-link" href="/uploads/">My Uploads</a>
      {% if user.is_authenticated %}
      <form action="{% url 'logout' %}" method="post" class="inline-form">
        {% csrf_token %}
        <button type="submit" class="btn btn-secondary">Logout</button>
      </form>
      {% else %}
      <a class="btn btn-primary" href="/accounts/login/">Login</a>
      <a class="nav-link" href="/accounts/signup/">Signup</a>
      {% endif %}
    </nav>
  </div>
  </header>
  <main class="container">
    {% for message in messages %}
      <div class="alert {{ message.tags }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <div class="container footer-inner">
      <span>&copy; {{ now|date:"Y" }} Secure Uploads</span>
    </div>
  </footer>
</body>
</html>
